<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Afacad+Flux:wght@100..1000&display=swap"
      rel="stylesheet"
    />
    <link href="./css/style.css" rel="stylesheet" />
    <link href="./css/responsive.css" rel="stylesheet" />
    <title>Calculator</title>
  </head>
  <body>
    <main>
      <div class="global-container">
        <div class="history-container">
          <h1>history</h1>
          <div class="history"></div>
        </div>
        <div class="calculation-container">
          <p class="total"></p>
          <p class="calculation"></p>
          <div class="op-n-container">
            <button class="percent op single">&#37;</button>
            <button class="exponent op single">&#178;</button>
            <button class="clear ">&#8705;</button>
            <button class="delete">&#8656;</button>
            <button class="seven nr">7</button>
            <button class="eight nr">8</button>
            <button class="nine nr">9</button>
            <button class="divide op">&#247;</button>
            <button class="four nr">4</button>
            <button class="five nr">5</button>
            <button class="six nr">6</button>
            <button class="multiply op">&#215;</button>
            <button class="one nr">1</button>
            <button class="two nr">2</button>
            <button class="three nr">3</button>
            <button class="minus op">&#8722;</button>
            <button class="zero nr">0</button>
            <button class="double-zero nr">00</button>
            <button class="point">&#8729;</button>
            <button class="plus op">&#43;</button>
          </div>
        </div>
      </div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
